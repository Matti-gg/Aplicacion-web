<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Veterinaria</title>
    <style>
        /* ESTILOS GLOBALES Y MENÚ */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f7f4; 
            color: #2d3436; 
            margin: 0; 
            padding: 0; 
        }

        /* --- MENÚ DE NAVEGACIÓN --- */
        header {
            background-color: #1b4332;
            padding: 15px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo {
            color: white;
            font-weight: bold;
            font-size: 20px;
            text-decoration: none;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 20px;
        }

        nav ul li a {
            color: #b7e4c7;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: color 0.3s;
        }

        nav ul li a:hover, nav ul li a.active {
            color: white;
        }

        /* CONTENEDOR PRINCIPAL */
        .main-wrapper {
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        /* TUS ESTILOS ORIGINALES (MANTENIDOS Y PULIDOS) */
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 500px; 
        }

        h2 { color: #2d6a4f; text-align: center; margin-bottom: 25px; margin-top: 0; }
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 14px; }
        
        input, select, textarea { 
            width: 100%; padding: 12px; margin-top: 5px; 
            border: 1px solid #d1d8e0; border-radius: 10px; 
            box-sizing: border-box; font-size: 14px; outline: none; 
        }
        
        input:focus, textarea:focus { border-color: #40916c; box-shadow: 0 0 5px rgba(64, 145, 108, 0.2); }
        
        button { 
            width: 100%; background-color: #40916c; color: white; border: none; 
            padding: 14px; margin-top: 25px; border-radius: 10px; 
            cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s ease; 
        }
        
        button:hover { background-color: #2d6a4f; }

        .map-container { margin-top: 30px; border-radius: 12px; overflow: hidden; border: 1px solid #eee; }
        
        .social-media { text-align: center; margin-top: 25px; border-top: 1px solid #f1f1f1; padding-top: 20px; }
        .social-media p { font-size: 14px; color: #7f8c8d; margin-bottom: 15px; }
        .social-links { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .social-links a { color: #40916c; text-decoration: none; font-size: 14px; font-weight: 600; transition: color 0.2s; }
        .social-links a:hover { color: #1b4332; text-decoration: underline; }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">🐾 VetCare</a>
            <nav>
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="servicios.html">Servicios</a></li>
                    <li><a href="contacto.html" class="active">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="main-wrapper">
        <div class="container">
            <h2>Contacto Veterinaria</h2>
            <form action="#" method="POST">
                <label>Nombre del Dueño</label>
                <input type="text" name="dueno" placeholder="Tu nombre completo" required>
                
                <label>Nombre de la Mascota</label>
                <input type="text" name="mascota" placeholder="Nombre de tu peludito">
                
                <label>Correo Electrónico</label>
                <input type="email" name="email" placeholder="ejemplo@correo.com" required>
                
                <label>Motivo de Consulta</label>
                <select name="motivo">
                    <option>Consulta General</option>
                    <option>Vacunación / Desparasitación</option>
                    <option>Estética Canina</option>
                    <option>Urgencia Médica</option>
                </select>
                
                <label>Mensaje o Síntomas</label>
                <textarea name="mensaje" rows="3" placeholder="Cuéntanos en qué podemos ayudarte..."></textarea>
                
                <button type="submit">Agendar Cita / Enviar</button>
            </form>

            <div class="map-container">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3329.1762115160413!2d-70.6534575!3d-33.4443195!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzPCsDI2JzM5LjUiUyA3MMKwMzknMTIuNCJX!5e0!3m2!1ses!2scl!4v1700000000000!5m2!1ses!2scl" 
                    width="100%" height="180" style="border:0;" allowfullscreen="" loading="lazy">
                </iframe>
            </div>

            <div class="social-media">
                <p>Encuéntranos en Redes Sociales</p>
                <div class="social-links">
                    <a href="https://instagram.com/tu_usuario" target="_blank">Instagram</a>
                    <a href="https://facebook.com/tu_usuario" target="_blank">Facebook</a>
                    <a href="https://tiktok.com/@tu_usuario" target="_blank">TikTok</a>
                    <a href="https://wa.me/56912345678" target="_blank">WhatsApp</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
