<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Veterinaria</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f7f4; color: #2d3436; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #2d6a4f; text-align: center; margin-bottom: 25px; }
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #d1d8e0; border-radius: 10px; box-sizing: border-box; font-size: 14px; outline: none; }
        input:focus, textarea:focus { border-color: #40916c; box-shadow: 0 0 5px rgba(64, 145, 108, 0.2); }
        button { width: 100%; background-color: #40916c; color: white; border: none; padding: 14px; margin-top: 25px; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s ease; }
        button:hover { background-color: #2d6a4f; }
        .map-container { margin-top: 30px; border-radius: 12px; overflow: hidden; border: 1px solid #eee; }
        .social-media { text-align: center; margin-top: 25px; border-top: 1px solid #f1f1f1; padding-top: 20px; }
        .social-media p { font-size: 14px; color: #7f8c8d; margin-bottom: 15px; }
        .social-links { display: flex; justify-content: center; gap: 20px; }
        .social-links a { color: #40916c; text-decoration: none; font-size: 14px; font-weight: 600; transition: color 0.2s; }
        .social-links a:hover { color: #1b4332; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Contacto Veterinaria</h2>
        <form>
            <label>Nombre del Dueño</label>
            <input type="text" placeholder="Tu nombre completo" required>
            <label>Nombre de la Mascota</label>
            <input type="text" placeholder="Nombre de tu peludito">
            <label>Correo Electrónico</label>
            <input type="email" placeholder="ejemplo@correo.com" required>
            <label>Motivo de Consulta</label>
            <select>
                <option>Consulta General</option>
                <option>Vacunación / Desparasitación</option>
                <option>Estética Canina</option>
                <option>Urgencia Médica</option>
            </select>
            <label>Mensaje o Síntomas</label>
            <textarea rows="3" placeholder="Cuéntanos en qué podemos ayudarte..."></textarea>
            <button type="submit">Agendar Cita / Enviar</button>
        </form>

        <div class="map-container">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3151.835434509374!2d144.95373531531675!3d-37.81720997975171!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6ad65d4c2b349649%3A0xb6899234e561db11!2sEnvato!5e0!3m2!1ses!2scl!4v1614123456789!5m2!1ses!2scl" 
                width="100%" height="180" style="border:0;" allowfullscreen="" loading="lazy">
            </iframe>
        </div>

        <div class="social-media">
            <p>Encuéntranos en Redes Sociales</p>
            <div class="social-links">
                <a href="#">Instagram</a>
                <a href="#">Facebook</a>
                <a href="#">TikTok</a>
                <a href="#">WhatsApp</a>
            </div>
        </div>
    </div>
</body>
</html>
